<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}BIG-EYE-BOT{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  {% if request.cookies.get("scouter_session") %}
  <nav class="navbar">
    <img src="/static/logo.png" alt="BIG-EYE" style="width:32px;height:32px;object-fit:cover;border-radius:50%;vertical-align:middle;margin-right:8px;" /><span class="nav-brand">BIG-EYE-BOT</span>
    <div class="nav-links">
      <a href="/dashboard">Dashboard</a>
      {% set _username = get_username(request) %}
      {% if _username %}<span style="color:var(--text-muted); font-size:0.85rem;">👤 {{ _username }}</span>{% endif %}
      <a href="/logout">Logout</a>
    </div>
  </nav>
  {% endif %}

  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
