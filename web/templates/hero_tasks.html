{% extends "base.html" %}
{% block title %}Heldenaufgaben · {{ guild.guild_name }} · TravOps{% endblock %}

{% block content %}
<style>
.ht-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem; }
.ht-tabs { display:flex; gap:0.5rem; margin-bottom:1.5rem; flex-wrap:wrap; }
.ht-tab {
  padding:0.5rem 1.2rem; border-radius:99px; font-size:0.88rem; font-weight:600;
  cursor:pointer; border:2px solid var(--border); background:transparent;
  color:var(--text-muted); transition:all 0.15s;
}
.ht-tab.active { border-color:#f59e0b; background:#f59e0b; color:#000; }
.ht-tab:hover:not(.active) { border-color:#f59e0b; color:#f59e0b; }

.ht-summary {
  display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:0.75rem;
  margin-bottom:1.5rem;
}
.ht-stat {
  background:var(--bg-card); border:1px solid var(--border); border-radius:10px;
  padding:0.85rem 1rem; text-align:center;
}
.ht-stat-val { font-size:1.35rem; font-weight:800; color:#f59e0b; }
.ht-stat-label { font-size:0.72rem; color:var(--text-muted); margin-top:0.2rem; text-transform:uppercase; letter-spacing:.05em; }

.ht-section { margin-bottom:1.75rem; }
.ht-section-title {
  font-size:0.78rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em;
  color:var(--text-muted); padding-bottom:0.4rem; border-bottom:1px solid var(--border);
  margin-bottom:0.6rem;
}
.ht-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:0.45rem; }
.ht-task {
  display:flex; align-items:center; gap:0.6rem;
  background:var(--bg-card); border:1px solid var(--border); border-radius:8px;
  padding:0.5rem 0.75rem; cursor:pointer; transition:all 0.12s; user-select:none;
}
.ht-task:hover { border-color:#f59e0b44; }
.ht-task.done { border-color:#22c55e55; background:rgba(34,197,94,0.07); }
.ht-task.done .ht-task-name { text-decoration:line-through; color:var(--text-muted); }
.ht-checkbox {
  width:16px; height:16px; border-radius:4px; border:2px solid var(--border);
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-size:0.7rem; transition:all 0.12s;
}
.ht-task.done .ht-checkbox { background:#22c55e; border-color:#22c55e; color:#fff; }
.ht-task-info { flex:1; min-width:0; }
.ht-task-name { font-size:0.82rem; font-weight:600; color:var(--text); line-height:1.2; }
.ht-task-sub  { font-size:0.72rem; color:var(--text-muted); margin-top:1px; }
.ht-task-rewards { display:flex; gap:0.4rem; align-items:center; flex-shrink:0; }
.ht-res  { font-size:0.72rem; font-weight:700; color:#f59e0b; white-space:nowrap; }
.ht-xp   { font-size:0.72rem; font-weight:700; color:#818cf8; white-space:nowrap; }
.ht-bp-badge {
  font-size:0.65rem; font-weight:700; padding:1px 5px; border-radius:4px;
  background:rgba(88,101,242,0.2); color:#818cf8; white-space:nowrap; flex-shrink:0;
}
.ht-task.bp-done { border-color: rgba(88,101,242,0.4); background: rgba(88,101,242,0.06); }
.ht-task.bp-done .ht-task-name { text-decoration: line-through; color: var(--text-muted); }
.ht-task.bp-done .ht-checkbox  { background: #818cf8; border-color: #818cf8; color: #fff; }

.ht-reset-btn {
  background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:#ef4444;
  border-radius:8px; padding:0.35rem 0.85rem; font-size:0.78rem; font-weight:600;
  cursor:pointer; transition:all 0.15s;
}
.ht-reset-btn:hover { background:rgba(239,68,68,0.2); }
</style>

<div class="ht-header">
  <div>
    <h1 style="font-size:1.4rem;font-weight:800;margin-bottom:0.2rem;" data-i18n="herotasks.title">🗡️ Heldenaufgaben</h1>
    <p style="font-size:0.85rem;color:var(--text-muted);" data-i18n="herotasks.subtitle">Meilensteine abhaken → Ressourcen & XP-Belohnungen tracken</p>
  </div>
  <button class="ht-reset-btn" onclick="resetAll()" data-i18n="herotasks.reset.btn">🔄 Alles zurücksetzen</button>
</div>

<!-- Village tabs -->
<div class="ht-tabs">
  <button class="ht-tab active" onclick="switchVillage('start', this)" data-i18n="herotasks.tab.start">🏠 Startdorf</button>
  <button class="ht-tab" onclick="switchVillage('settled', this)" data-i18n="herotasks.tab.settled">🏘️ Gesiedeltes Dorf</button>
</div>

<!-- Summary bar -->
<div class="ht-summary">
  <div class="ht-stat">
    <div class="ht-stat-val" id="statDone">0</div>
    <div class="ht-stat-label" data-i18n="herotasks.stat.done">Erledigt</div>
  </div>
  <div class="ht-stat">
    <div class="ht-stat-val" id="statTotal">0</div>
    <div class="ht-stat-label" data-i18n="herotasks.stat.total">Gesamt</div>
  </div>
  <div class="ht-stat">
    <div class="ht-stat-val" id="statRes">0</div>
    <div class="ht-stat-label" data-i18n="herotasks.stat.res">Res verdient</div>
  </div>
  <div class="ht-stat">
    <div class="ht-stat-val" id="statXp">0</div>
    <div class="ht-stat-label">XP verdient</div>
  </div>
</div>

<!-- Tasks container -->
<div id="tasksContainer"></div>

// ── State ─────────────────────────────────────────────────────────────
const _GUILD_ID = '{{ guild.guild_id }}';
let done = htGetDone(_GUILD_ID);
let bpDone = htGetBp(_GUILD_ID);
let currentVillage = 'start';

function save() {
  htSaveDone(_GUILD_ID, done);
}

// ── Render ────────────────────────────────────────────────────────────
function render() {
  const vdata = VILLAGES[currentVillage];
  const container = document.getElementById('tasksContainer');
  container.innerHTML = '';

  let totalDone = 0, totalCount = 0, totalRes = 0, totalXp = 0;

  vdata.sections.forEach(section => {
    const secEl = document.createElement('div');
    secEl.className = 'ht-section';
    secEl.innerHTML = `<div class="ht-section-title">${section.title}</div><div class="ht-grid" id="grid_${section.tasks[0].id}"></div>`;
    container.appendChild(secEl);
    const grid = secEl.querySelector('.ht-grid');

    section.tasks.forEach(task => {
      totalCount++;
      const isDone = done.has(task.id);
      const isBp   = bpDone.has(task.id);
      if (isDone) { totalDone++; totalRes += task.res; totalXp += task.xp; }

      let cls = 'ht-task';
      if (isDone && isBp)  cls += ' done bp-done';
      else if (isDone)     cls += ' done';

      const el = document.createElement('div');
      el.className = cls;
      el.innerHTML = `
        <div class="ht-checkbox">${isDone ? '✓' : ''}</div>
        <div class="ht-task-info">
          <div class="ht-task-name">${task.name}</div>
          <div class="ht-task-sub">${task.sub}</div>
        </div>
        <div class="ht-task-rewards">
          <span class="ht-res">+${task.res.toLocaleString()}</span>
          <span class="ht-xp">${task.xp}xp</span>
          ${isBp ? '<span class="ht-bp-badge">🔗 Blueprint</span>' : ''}
        </div>`;
      el.onclick = () => toggle(task, el);
      grid.appendChild(el);
    });
  });

  document.getElementById('statDone').textContent  = totalDone;
  document.getElementById('statTotal').textContent = totalCount;
  document.getElementById('statRes').textContent   = totalRes.toLocaleString();
  document.getElementById('statXp').textContent    = totalXp.toLocaleString();
}

function toggle(task, el) {
  if (done.has(task.id)) {
    done.delete(task.id);
    bpDone.delete(task.id);
    el.classList.remove('done', 'bp-done');
    el.querySelector('.ht-checkbox').textContent = '';
  } else {
    done.add(task.id);
    el.classList.add('done');
    el.querySelector('.ht-checkbox').textContent = '✓';
  }
  save();
  htSaveBp(_GUILD_ID, bpDone);
  // Update summary
  let totalDone = 0, totalRes = 0, totalXp = 0;
  const vdata = VILLAGES[currentVillage];
  vdata.sections.forEach(s => s.tasks.forEach(t => {
    if (done.has(t.id)) { totalDone++; totalRes += t.res; totalXp += t.xp; }
  }));
  document.getElementById('statDone').textContent = totalDone;
  document.getElementById('statRes').textContent  = totalRes.toLocaleString();
  document.getElementById('statXp').textContent   = totalXp.toLocaleString();
}

function switchVillage(key, btn) {
  currentVillage = key;
  document.querySelectorAll('.ht-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function resetAll() {
  if (!confirm('Alle Heldenaufgaben für dieses Dorf zurücksetzen?')) return;
  const vdata = VILLAGES[currentVillage];
  vdata.sections.forEach(s => s.tasks.forEach(t => { done.delete(t.id); bpDone.delete(t.id); }));
  save();
  htSaveBp(_GUILD_ID, bpDone);
  render();
}

render();
</script>
