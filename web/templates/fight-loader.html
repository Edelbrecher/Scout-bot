<style>
/* ── Overlay ───────────────────────────────────────────────────────────────── */
#fl-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 99999;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(6px);
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 1.25rem;
}
#fl-overlay.fl-visible { display: flex; animation: fl-fade-in 0.18s ease; }

/* ── Arena ─────────────────────────────────────────────────────────────────── */
#fl-arena {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  gap: 0;
}
#fl-left-wrap, #fl-right-wrap {
  display: flex;
  align-items: flex-end;
}
#fl-clash-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 52px;
  flex-shrink: 0;
  padding-bottom: 28px;
}
.fl-name {
  text-align: center;
  font-size: .72rem;
  font-weight: 700;
  letter-spacing: .04em;
  text-transform: uppercase;
  margin-top: .4rem;
  color: #9ca3af;
}

/* ── Lunge animation (same keyframe for both; right fighter's outer wrapper is scaleX(-1)) */
.fl-lunge { animation: fl-lunge 1.5s cubic-bezier(0.45,0,0.55,1) infinite; }

@keyframes fl-lunge {
  0%,  100% { transform: translateX(0); }
  42%, 58%  { transform: translateX(22px); }
}
@keyframes fl-spark {
  0%, 38%, 62%, 100% { opacity: 0; transform: scale(0.15) rotate(0deg); }
  50%               { opacity: 1; transform: scale(1)    rotate(14deg); }
}
@keyframes fl-fade-in { from { opacity:0; } to { opacity:1; } }
@keyframes fl-bob {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-3px); }
}

#fl-spark { animation: fl-spark 1.5s cubic-bezier(0.45,0,0.55,1) infinite; }

#fl-caption {
  color: #4b5563;
  font-size: .78rem;
  letter-spacing: .06em;
  text-transform: uppercase;
}
</style>

var FL_KEYS = Object.keys(FL);

function flPickTwo() {
  var shuffled = FL_KEYS.slice().sort(function(){ return Math.random()-0.5; });
  return [shuffled[0], shuffled[1]];
}

function flSetFighter(svgEl, faction) {
  var f = FL[faction];
  svgEl.setAttribute('viewBox', f.vb);
  svgEl.setAttribute('height', f.h);
  svgEl.innerHTML = f.svg;
}

function flShow() {
  var pair = flPickTwo();
  var left  = FL[pair[0]];
  var right = FL[pair[1]];

  // Set left fighter
  var svgL = document.getElementById('fl-svg-l');
  svgL.setAttribute('viewBox', left.vb);
  svgL.setAttribute('height', left.h);
  svgL.innerHTML = left.svg;
  document.getElementById('fl-name-l').textContent = left.name;

  // Set right fighter (uses same SVG, mirrored by outer wrapper)
  var svgR = document.getElementById('fl-svg-r');
  svgR.setAttribute('viewBox', right.vb);
  svgR.setAttribute('height', right.h);
  svgR.innerHTML = right.svg;
  document.getElementById('fl-name-r').textContent = right.name;

  document.getElementById('fl-overlay').classList.add('fl-visible');
}

function flHide() {
  document.getElementById('fl-overlay').classList.remove('fl-visible');
}

/* ── Minimum display time ─────────────────────────────────────────────────── */
var _flShownAt = 0;
var _FL_MIN_MS = 4500;   // fight runs at least 4.5 s

function flShowTimed() {
  _flShownAt = Date.now();
  flShow();
}

function flHideSafe() {
  var elapsed = Date.now() - _flShownAt;
  var remaining = _FL_MIN_MS - elapsed;
  if (remaining > 0) {
    setTimeout(flHide, remaining);
  } else {
    flHide();
  }
}

/* ── URL helpers ──────────────────────────────────────────────────────────── */
function flShouldShow(href) {
  // Normalise to a path string (strip origin if absolute)
  var path = href;
  try { path = new URL(href, location.href).pathname; } catch(e) {}
  // Show only for: /guild/<id>  (dashboard, exact)  or  /guild/<id>/farming
  // Matches /guild/123  /guild/123/  /guild/123/farming  /guild/123/farming?...
  return /\/guild\/[^/]+(\/farming)?\/?$/.test(path);
}

/* ── Trigger on internal link clicks ──────────────────────────────────────── */
document.addEventListener('click', function(e) {
  var a = e.target.closest('a[href]');
  if (!a) return;
  var href = a.getAttribute('href') || '';
  if (a.target === '_blank') return;
  if (href.startsWith('#')) return;
  if (href.startsWith('javascript:')) return;
  if (href.startsWith('http') && !href.startsWith(location.origin)) return;
  if (a.hasAttribute('download')) return;
  if (a.dataset.noLoader) return;
  if (a.closest('form')) return;
  if (!flShouldShow(href)) return;          // ← only farming + dashboard
  var t = setTimeout(flShowTimed, 120);
  window.addEventListener('popstate', function(){ clearTimeout(t); flHide(); }, {once:true});
});

/* ── Hide when new page is ready (but respect minimum time) ──────────────── */
window.addEventListener('pageshow', flHideSafe);
document.addEventListener('DOMContentLoaded', flHideSafe);

})();
</script>
