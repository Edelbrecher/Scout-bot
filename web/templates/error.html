{% extends "base.html" %}
{% block title %}{{ code }} · TravOps{% endblock %}

{% block content %}
<div class="container" style="max-width:600px; text-align:center; padding:4rem 1rem;">
  <div style="font-size:5rem; margin-bottom:0.5rem;">{{ emoji }}</div>
  <h1 style="font-size:3rem; font-weight:900; color:var(--text); margin:0 0 0.5rem;">{{ code }}</h1>
  <p style="font-size:1.15rem; color:var(--text-muted); margin:0 0 2rem;">{{ message }}</p>
  {% if detail %}
  <p style="font-size:0.85rem; color:rgba(255,255,255,0.25); font-family:monospace; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; padding:0.75rem 1rem; margin-bottom:2rem; word-break:break-all;">{{ detail }}</p>
  {% endif %}
  <div style="display:flex; gap:0.75rem; justify-content:center; flex-wrap:wrap;">
    <a href="/dashboard" class="btn btn-primary">🏠 Dashboard</a>
    <a href="javascript:history.back()" class="btn btn-secondary">← Back</a>
  </div>
</div>
{% endblock %}
