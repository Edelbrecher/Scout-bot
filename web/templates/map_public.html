<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Map · {{ guild.guild_name }} · TravOps</title>
<meta property="og:title" content="Travian Map · {{ guild.guild_name }}">
<meta property="og:description" content="Shared map view — TravOps">
<meta property="og:image" content="/static/logo.png">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#0f172a; --bg-card:#1e293b; --bg-main:#0f172a;
  --text:#e2e8f0; --text-muted:#64748b; --border:#334155; --accent:#6366f1;
}
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }

#topbar {
  display:flex; align-items:center; gap:.75rem; padding:.6rem 1rem;
  background:var(--bg-card); border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
#topbar .logo { font-size:.9rem; font-weight:700; color:var(--accent); opacity:.85; }
#topbar .guild-name { font-size:.85rem; color:var(--text-muted); }
#topbar .badge {
  font-size:.7rem; font-weight:700; padding:2px 8px; border-radius:20px;
  background:rgba(99,102,241,.15); border:1px solid rgba(99,102,241,.3); color:#a5b4fc;
}
#topbar .spacer { flex:1; }
#topbar .hint { font-size:.72rem; color:var(--text-muted); }

#mapWrap {
  position:relative; background:#2d5a1e; overflow:hidden; user-select:none;
  height: calc(100vh - 48px);
}
#mapCanvas { display:block; width:100%; height:100%; cursor:crosshair; }
#drawCanvas { position:absolute;top:0;left:0;pointer-events:none; }
#mapTooltip {
  position:absolute; background:rgba(10,18,10,.94); border:1px solid rgba(255,255,255,.18);
  padding:.5rem .9rem; border-radius:7px; font-size:.8rem; pointer-events:none;
  display:none; z-index:20; white-space:nowrap; line-height:1.8; color:#e0e0e0; max-width:300px;
}
#mapStatus {
  position:absolute; top:10px; left:10px;
  background:rgba(0,0,0,.65); padding:.25rem .75rem;
  border-radius:4px; font-size:.78rem; color:#ccc;
}
#coordDisplay {
  position:absolute; bottom:10px; right:10px;
  background:rgba(0,0,0,.65); padding:.2rem .6rem;
  border-radius:4px; font-size:.75rem; color:#aaa; font-family:monospace;
}
#viewBar {
  position:absolute; top:10px; right:10px;
  display:flex; gap:.35rem; flex-direction:column; align-items:flex-end; z-index:10;
}
#viewBar select {
  padding:.3rem .55rem; background:rgba(15,23,42,.9); color:var(--text);
  border:1px solid var(--border); border-radius:5px; font-size:.8rem; cursor:pointer;
}
#jumpBar {
  display:flex; gap:.3rem;
}
#jumpBar input {
  width:70px; padding:.28rem .4rem; background:rgba(15,23,42,.9); color:var(--text);
  border:1px solid var(--border); border-radius:5px; font-size:.78rem; font-family:monospace;
}
#jumpBar button {
  padding:.28rem .55rem; background:rgba(99,102,241,.2); border:1px solid rgba(99,102,241,.4);
  color:#a5b4fc; border-radius:5px; font-size:.78rem; cursor:pointer;
}
</style>
</head>
<body>

<div id="topbar">
  <span class="logo">TravOps</span>
  <span class="guild-name">{{ guild.guild_name }}</span>
  <span class="badge">👁️ Read-only · Public View</span>
  <span class="spacer"></span>
  <span class="hint">Scroll = Zoom &nbsp;·&nbsp; Drag = Pan &nbsp;·&nbsp; Hover = Details &nbsp;·&nbsp; Dblclick = Center</span>
</div>

<div id="mapWrap">
  <canvas id="mapCanvas"></canvas>
  <canvas id="drawCanvas"></canvas>
  <div id="mapTooltip"></div>
  <div id="mapStatus">Loading map data…</div>
  <div id="coordDisplay">—|—</div>

  <!-- Floating controls -->
  <div id="viewBar">
    <select id="viewMode" onchange="setViewMode(this.value)">
      <option value="tribe">Tribe colours</option>
      <option value="alliance">Heatmap — Alliances</option>
      <option value="player">Heatmap — Players</option>
      <option value="pop">Heatmap — Population</option>
    </select>
    <div id="jumpBar">
      <input type="number" id="jumpX" placeholder="X" title="X coordinate">
      <input type="number" id="jumpY" placeholder="Y" title="Y coordinate">
      <button onclick="jumpToCoords()" title="Jump to coordinates">⌖</button>
    </div>
  </div>
</div>

<script>
const GUILD_ID    = {{ guild.guild_id | tojson }};
const SCOUTED_RAW = {{ scouted | tojson }};
const SHARE_STATE = {{ share_state_json | default('null') | safe }};
const PUBLIC_TOKEN = {{ public_token | tojson }};

const TRIBE_COLOR = { 1:'#c0392b', 2:'#85929e', 3:'#58d68d', 4:'#d4ac0d', 5:'#9b59b6', 6:'#1abc9c' };
const NATAR_COLOR  = '#e67e22';
const TRIBE_NAME   = { 1:'Romans', 2:'Teutons', 3:'Gauls', 4:'Egyptians', 5:'Huns', 6:'Spartans' };
const TERRAIN_BASE = '#2d5a1e';

const canvas  = document.getElementById('mapCanvas');
const ctx     = canvas.getContext('2d');
const drawCanvas = document.getElementById('drawCanvas');
const dctx    = drawCanvas.getContext('2d');
const tooltip = document.getElementById('mapTooltip');
const statusEl= document.getElementById('mapStatus');
const coordEl = document.getElementById('coordDisplay');

let villages   = [];
let scoutMap   = new Map();
let mapRadius  = 400;
let scale      = 2;
let camX = 0, camY = 0;
let dragging   = false, dragSX = 0, dragSY = 0, camSX = 0, camSY = 0;
let viewMode   = 'tribe';
let allianceColorMap = new Map();
let playerColorMap   = new Map();
let maxPop = 1;
let playerFilters   = [];  // [{name, color}]
let allianceFilters = [];  // [{name, color}]
let highlighted = new Map(); // "x|y" → color

for (const s of SCOUTED_RAW) {
  const m = (s.coordinates || '').match(/(-?\d+)\|(-?\d+)/);
  if (m) scoutMap.set(`${+m[1]}|${+m[2]}`, s);
}

function hashColor(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (Math.imul(31, h) + str.charCodeAt(i)) | 0;
  return `hsl(${((h>>>0)%360)},70%,55%)`;
}
function popColor(pop) {
  const t = Math.min(1, pop / maxPop);
  return `rgb(${Math.round(30+t*220)},${Math.round(100-t*90)},${Math.round(220-t*190)})`;
}
function getVillageColor(v) {
  if (v.isNatar) return NATAR_COLOR;
  // Highlight filter takes priority
  if (highlighted.size > 0) {
    const hlColor = highlighted.get(`${v.x}|${v.y}`);
    if (hlColor) return hlColor;
    // Dim non-highlighted villages
    if (playerFilters.length > 0 || allianceFilters.length > 0) return 'rgba(100,100,100,0.25)';
  }
  switch (viewMode) {
    case 'alliance': {
      if (!v.alliance) return '#444';
      if (!allianceColorMap.has(v.alliance)) allianceColorMap.set(v.alliance, hashColor(v.alliance));
      return allianceColorMap.get(v.alliance);
    }
    case 'player': {
      if (!v.player) return '#444';
      if (!playerColorMap.has(v.player)) playerColorMap.set(v.player, hashColor(v.player));
      return playerColorMap.get(v.player);
    }
    case 'pop': return popColor(v.pop || 0);
    default:    return TRIBE_COLOR[v.tribe] || '#aaaaaa';
  }
}

function worldToCanvas(wx, wy) {
  return [canvas.width/2 + (wx-camX)*scale, canvas.height/2 - (wy-camY)*scale];
}
function canvasToWorld(cx, cy) {
  return [camX + (cx-canvas.width/2)/scale, camY - (cy-canvas.height/2)/scale];
}

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = TERRAIN_BASE;
  ctx.fillRect(0,0,W,H);

  // World border
  { const [bx0,by0]=worldToCanvas(-mapRadius-.5,mapRadius+.5),[bx1,by1]=worldToCanvas(mapRadius+.5,-mapRadius-.5);
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=2;ctx.strokeRect(bx0,by0,bx1-bx0,by1-by0); }

  // Grid
  if (scale >= 3) {
    const gStep = scale>=14?10:scale>=5?50:100;
    ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;
    const [wx0]=canvasToWorld(0,0),[wx1]=canvasToWorld(W,0),[,wy0]=canvasToWorld(0,H),[,wy1]=canvasToWorld(0,0);
    for (let g=Math.floor(wx0/gStep)*gStep;g<=wx1;g+=gStep){const[cx]=worldToCanvas(g,0);ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();}
    for (let g=Math.floor(wy0/gStep)*gStep;g<=wy1;g+=gStep){const[,cy]=worldToCanvas(0,g);ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();}
  }

  // Axes
  { const [ax]=worldToCanvas(0,0),[,ay]=worldToCanvas(0,0);
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ax,0);ctx.lineTo(ax,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,ay);ctx.lineTo(W,ay);ctx.stroke();
    ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(ax-8,ay);ctx.lineTo(ax+8,ay);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ax,ay-8);ctx.lineTo(ax,ay+8);ctx.stroke(); }

  // Axis labels
  if (scale >= 3) {
    const lStep=scale>=14?10:scale>=5?50:100,fSize=Math.max(8,Math.min(11,scale*2));
    ctx.font=`${fSize}px monospace`;ctx.fillStyle='rgba(255,255,255,0.35)';
    const [wx0]=canvasToWorld(0,0),[wx1]=canvasToWorld(W,0),[,wy0]=canvasToWorld(0,H),[,wy1]=canvasToWorld(0,0);
    for (let gx=Math.ceil(wx0/lStep)*lStep;gx<=wx1;gx+=lStep){if(!gx)continue;const[cx]=worldToCanvas(gx,0);ctx.fillText(`${gx}`,cx+2,fSize+2);}
    for (let gy=Math.ceil(wy0/lStep)*lStep;gy<=wy1;gy+=lStep){if(!gy)continue;const[,cy]=worldToCanvas(0,gy);ctx.fillText(`${gy}`,2,cy-2);}
  }

  // Villages
  const [vx0,vy1]=canvasToWorld(-scale,H+scale),[vx1,vy0]=canvasToWorld(W+scale,-scale);
  const tS=Math.max(1,scale);
  ctx.save();
  for (const v of villages) {
    if (v.x<vx0||v.x>vx1||v.y<vy1||v.y>vy0) continue;
    const [cx,cy]=worldToCanvas(v.x,v.y);
    const key=`${v.x}|${v.y}`;
    const isScouted=scoutMap.has(key);

    ctx.shadowBlur=0;
    if (isScouted) {
      const r=Math.max(2.5,tS*0.85);
      ctx.shadowColor='#e05555';ctx.shadowBlur=scale>3?5:2;
      ctx.fillStyle='#e05555';
      ctx.beginPath();ctx.arc(cx,cy,r/2,0,Math.PI*2);ctx.fill();
    } else {
      const color=getVillageColor(v),r=Math.max(1.2,tS*0.82);
      ctx.fillStyle=color;ctx.fillRect(cx-r/2,cy-r/2,r,r);
      if (v.isCapital&&scale>=5) {
        ctx.shadowBlur=0;ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=0.8;
        ctx.strokeRect(cx-r/2,cy-r/2,r,r);
      }
    }
    ctx.shadowBlur=0;
  }
  ctx.restore();
}

function setViewMode(mode) { viewMode=mode; draw(); }

function jumpToCoords() {
  const x=parseInt(document.getElementById('jumpX').value);
  const y=parseInt(document.getElementById('jumpY').value);
  if (!isNaN(x)&&!isNaN(y)) { camX=x;camY=y;scale=Math.max(scale,10);draw(); }
}

// Mouse / touch
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const cx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const cy=(e.clientY-rect.top)*(canvas.height/rect.height);
  const [wx,wy]=canvasToWorld(cx,cy);
  scale=Math.max(0.3,Math.min(80,scale*(e.deltaY<0?1.18:0.847)));
  camX=wx-(cx-canvas.width/2)/scale;
  camY=wy+(cy-canvas.height/2)/scale;
  draw();
},{passive:false});

canvas.addEventListener('mousedown',e=>{if(e.button!==0)return;dragging=true;dragSX=e.clientX;dragSY=e.clientY;camSX=camX;camSY=camY;canvas.style.cursor='grabbing';});
window.addEventListener('mouseup',()=>{dragging=false;canvas.style.cursor='crosshair';});
window.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const cx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const cy=(e.clientY-rect.top)*(canvas.height/rect.height);
  if (dragging){camX=camSX-(e.clientX-dragSX)/scale;camY=camSY+(e.clientY-dragSY)/scale;draw();}
  const [wx,wy]=canvasToWorld(cx,cy);
  coordEl.textContent=`${Math.round(wx)}|${Math.round(wy)}`;
  const snap=Math.max(1.5,12/scale);
  let best=null,bestD=Infinity;
  for (const v of villages){const d=Math.hypot(v.x-wx,v.y-wy);if(d<snap&&d<bestD){bestD=d;best=v;}}
  if (best){
    const sc=scoutMap.get(`${best.x}|${best.y}`);
    const col=getVillageColor(best);
    let tip=`<strong style="color:${col};">${best.name||'?'}</strong> <span style="color:#666;">${best.x}|${best.y}</span>`;
    if (best.player)   tip+=`<br>👤 <strong>${best.player}</strong>`;
    if (best.alliance) tip+=` <span style="color:#aaa;">[${best.alliance}]</span>`;
    tip+=`<br>⚔️ ${best.isNatar?'Natars':(TRIBE_NAME[best.tribe]||'?')}`;
    if (best.pop)      tip+=` &nbsp;·&nbsp; 🏘️ <strong>${best.pop.toLocaleString()}</strong>`;
    if (best.isCapital) tip+=' &nbsp;·&nbsp; 👑 Capital';
    if (sc) tip+=`<br><span style="color:#e05555;">🔴 Scouted: ${sc.player||''} / ${sc.village||''}</span>`;
    tooltip.innerHTML=tip;tooltip.style.display='block';
    const tx=e.clientX-rect.left+16,ty=e.clientY-rect.top-8;
    tooltip.style.left=`${Math.min(tx,rect.width-310)}px`;
    tooltip.style.top=`${Math.max(4,ty)}px`;
  } else { tooltip.style.display='none'; }
});
canvas.addEventListener('dblclick',e=>{
  const rect=canvas.getBoundingClientRect();
  const [wx,wy]=canvasToWorld((e.clientX-rect.left)*(canvas.width/rect.width),(e.clientY-rect.top)*(canvas.height/rect.height));
  camX=wx;camY=wy;draw();
});

// Parser (same as map.html)
function parseTuple(s){
  const vals=[];let i=0,L=s.length;
  while(i<L){
    while(i<L&&(s[i]===' '||s[i]==='\t'))i++;
    if(i>=L)break;
    if(s[i]==="'"){i++;let str='';
      while(i<L){if(s[i]==="'"&&s[i-1]!=='\\')break;if(s[i]==='\\'&&s[i+1]==="'"){str+="'";i+=2;continue;}str+=s[i++];}
      i++;vals.push(str.replace(/&#39;/g,"'").replace(/&amp;/g,'&').replace(/&quot;/g,'"'));
    } else {let j=i;while(j<L&&s[j]!==',')j++;vals.push(s.slice(i,j).trim());i=j;}
    while(i<L&&(s[i]===' '||s[i]==='\t'))i++;
    if(i<L&&s[i]===',')i++;
  }
  return vals;
}
function parseSql(text){
  const isNum=s=>/^-?\d+(\.\d+)?$/.test((s||'').trim());
  const rows=[];let maxC=0;
  for (const line of text.split('\n')){
    const m=line.match(/VALUES\s*\((.+)\);?\s*$/i);if(!m)continue;
    const v=parseTuple(m[1]);if(v.length<7)continue;
    const f0=parseFloat(v[0]);if(isNaN(f0))continue;
    let x,y,tribe,vname,pop,pname,aname,isCapital;
    const v7num=isNum(v[7]);
    if(!v7num&&f0>=0&&v.length>10){x=+v[1];y=+v[2];tribe=+v[3]||0;vname=v[5]||'';pname=(v[7]&&v[7]!=='NULL'&&v[7]!=='')?v[7]:null;aname=(v[9]&&v[9]!=='NULL'&&v[9]!=='')?v[9]:null;pop=+v[10]||0;isCapital=v[12]==='TRUE'||v[12]==='1';}
    else if(!v7num&&Math.abs(f0)<=800){x=+v[0];y=+v[1];tribe=+v[3]||0;vname=v[5]||'';pop=+v[6]||0;pname=(v[7]&&v[7]!=='NULL')?v[7]:null;aname=(v[9]&&v[9]!=='NULL'&&v[9]!=='')?v[9]:null;isCapital=v[12]==='TRUE'||v[12]==='1';}
    else{x=+v[1];y=+v[2];tribe=+v[4]||0;vname=v[6]||'';pop=+v[7]||0;pname=(v[8]&&v[8]!=='NULL')?v[8]:null;aname=(v[10]&&v[10]!=='NULL'&&v[10]!=='')?v[10]:null;isCapital=v[13]==='TRUE'||v[13]==='1';}
    if(isNaN(x)||isNaN(y))continue;
    const isNatar=pname==='Natars'||(pname===null&&tribe>0&&pop<=2);
    const c=Math.max(Math.abs(x),Math.abs(y));
    if(c>maxC&&c<=800)maxC=c;
    rows.push({x,y,tribe,name:vname,pop,player:pname,alliance:aname,isCapital,isNatar});
  }
  return {rows,maxCoord:maxC||400};
}

function rebuildHighlights() {
  highlighted.clear();
  for (const f of playerFilters) {
    for (const v of villages) {
      if (v.player && v.player.toLowerCase().includes(f.name.toLowerCase()))
        highlighted.set(`${v.x}|${v.y}`, f.color);
    }
  }
  for (const f of allianceFilters) {
    for (const v of villages) {
      if (v.alliance && v.alliance.toLowerCase().includes(f.name.toLowerCase()))
        highlighted.set(`${v.x}|${v.y}`, f.color);
    }
  }
}

function renderLegend() {
  let el = document.getElementById('shareLegend');
  const items = [
    ...playerFilters.map(f => ({label: f.name, color: f.color})),
    ...allianceFilters.map(f => ({label: f.name, color: f.color})),
  ];
  if (!items.length) { if (el) el.remove(); return; }
  if (!el) {
    el = document.createElement('div');
    el.id = 'shareLegend';
    el.style.cssText = 'position:absolute;bottom:40px;left:10px;background:rgba(0,0,0,.75);padding:.5rem .75rem;border-radius:6px;font-size:.78rem;z-index:10;display:flex;flex-direction:column;gap:.3rem;';
    document.getElementById('mapWrap').appendChild(el);
  }
  el.innerHTML = items.map(i =>
    `<span><span style="display:inline-block;width:10px;height:10px;background:${i.color};border-radius:2px;margin-right:5px;"></span>${i.label}</span>`
  ).join('');
}

// Restore share state
function restoreFromShareState() {
  const src = SHARE_STATE;
  if (!src) return;
  if (src.v)  { viewMode=src.v; const sel=document.getElementById('viewMode'); if(sel)sel.value=viewMode; }
  if (src.cx != null) camX=parseFloat(src.cx)||0;
  if (src.cy != null) camY=parseFloat(src.cy)||0;
  if (src.z  != null) scale=parseFloat(src.z)||scale;

  if (src.pf) {
    src.pf.split(',').forEach(seg => {
      const idx = seg.lastIndexOf(':');
      if (idx < 1) return;
      playerFilters.push({ name: seg.slice(0, idx), color: seg.slice(idx + 1) });
    });
  }
  if (src.af) {
    src.af.split(',').forEach(seg => {
      const idx = seg.lastIndexOf(':');
      if (idx < 1) return;
      allianceFilters.push({ name: seg.slice(0, idx), color: seg.slice(idx + 1) });
    });
  }
}

// Restore drawings from share state (compact format: {c,w,e,p})
function restoreDrawings() {
  if (!SHARE_STATE || !SHARE_STATE.draw) return;
  try {
    const json = decodeURIComponent(atob(SHARE_STATE.draw));
    const data = JSON.parse(json);
    if (!Array.isArray(data)) return;
    window._sharedPaths = data.map(d => ({
      color: d.c || '#ff4444',
      width: d.w || 4,
      erase: !!d.e,
      pts:   d.p || [],
    }));
  } catch(e) { console.warn('Draw restore failed:', e); }
}

function renderSharedDrawings() {
  if (!window._sharedPaths || !window._sharedPaths.length) return;
  dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  for (const path of window._sharedPaths) {
    if (!path.pts || path.pts.length < 2) continue;
    if (path.erase) {
      dctx.globalCompositeOperation = 'destination-out';
      dctx.strokeStyle = 'rgba(0,0,0,1)';
    } else {
      dctx.globalCompositeOperation = 'source-over';
      dctx.strokeStyle = path.color;
    }
    dctx.lineWidth = path.width;
    dctx.lineCap   = 'round';
    dctx.lineJoin  = 'round';
    dctx.beginPath();
    const [sx, sy] = worldToCanvas(path.pts[0][0], path.pts[0][1]);
    dctx.moveTo(sx, sy);
    for (let i = 1; i < path.pts.length; i++) {
      const [px, py] = worldToCanvas(path.pts[i][0], path.pts[i][1]);
      dctx.lineTo(px, py);
    }
    dctx.stroke();
  }
  dctx.globalCompositeOperation = 'source-over';
}

function resize() {
  const rect = document.getElementById('mapWrap').getBoundingClientRect();
  canvas.width      = rect.width;
  canvas.height     = rect.height;
  drawCanvas.width  = rect.width;
  drawCanvas.height = rect.height;
  draw();
  renderSharedDrawings();
}

window.addEventListener('resize', resize);

async function loadMap() {
  statusEl.textContent = 'Loading map data…';
  try {
    const r = await fetch(`/guild/${GUILD_ID}/map/data?public_token=${encodeURIComponent(PUBLIC_TOKEN)}`);
    const json = await r.json();
    if (!r.ok) { statusEl.textContent=`Error: ${json.error}`; return; }
    const {rows, maxCoord} = parseSql(json.data);
    villages  = rows;
    mapRadius = maxCoord;
    maxPop    = Math.max(1, ...villages.map(v => v.pop||0));
    const natars = villages.filter(v=>v.isNatar).length;
    statusEl.textContent = `${(villages.length-natars).toLocaleString()} villages · ${natars} Natars`;
    if (!SHARE_STATE) {
      scale = Math.min(canvas.width, canvas.height) / (mapRadius*2+4);
      camX=0; camY=0;
    }
    rebuildHighlights();
    renderLegend();
    draw();
    renderSharedDrawings();
  } catch(e) { statusEl.textContent=`Error: ${e.message}`; }
}

restoreDrawings();
restoreFromShareState();
resize();
loadMap();

// Redraw drawings on every frame after pan/zoom
const _origDraw = draw;
window.draw = function() { _origDraw(); renderSharedDrawings(); };

document.getElementById('jumpX').addEventListener('keydown', e => e.key==='Enter' && jumpToCoords());
document.getElementById('jumpY').addEventListener('keydown', e => e.key==='Enter' && jumpToCoords());
</script>
</body>
</html>
