<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{{ ally_name }} · Server Countdown · TravOps</title>
  <meta property="og:title" content="{{ ally_name }} · Server Countdown"/>
  <meta property="og:description" content="Countdown zum Server-Ende von {{ ally_name }}"/>
  <meta name="theme-color" content="#6366f1"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;background:#05060f;font-family:'Segoe UI',system-ui,sans-serif;}

    /* ── Stars ─────────────────────────────────────────────────── */
    #stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

    /* ── Fireworks canvas ──────────────────────────────────────── */
    #fw-canvas{position:fixed;inset:0;z-index:10;pointer-events:none;opacity:0;transition:opacity .5s;}
    #fw-canvas.active{opacity:1;}

    /* ── Main layout ───────────────────────────────────────────── */
    #wrap{
      position:relative;z-index:5;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:100vh;gap:1.5rem;padding:2rem;
      text-align:center;
    }

    /* ── Alliance name ─────────────────────────────────────────── */
    #ally-name{
      font-size:clamp(1.1rem,3vw,2rem);
      font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      color:#fbbf24;
      text-shadow:0 0 30px rgba(251,191,36,.5);
    }

    /* ── Clock ─────────────────────────────────────────────────── */
    #clock{
      display:flex;align-items:flex-end;gap:clamp(.3rem,1.5vw,1.2rem);
    }
    .unit{display:flex;flex-direction:column;align-items:center;gap:.3rem;}
    .digits{
      font-size:clamp(3rem,12vw,9rem);
      font-weight:900;letter-spacing:-.02em;
      font-variant-numeric:tabular-nums;
      font-family:'Courier New',monospace;
      color:#e8eaf6;
      text-shadow:0 0 40px rgba(99,102,241,.7),0 0 80px rgba(99,102,241,.3);
      line-height:1;
    }
    .unit-label{
      font-size:clamp(.55rem,1.5vw,.85rem);
      letter-spacing:.18em;text-transform:uppercase;
      color:rgba(255,255,255,.35);font-weight:600;
    }
    .sep{
      font-size:clamp(2.5rem,10vw,7rem);
      font-weight:900;color:rgba(99,102,241,.6);
      line-height:1;padding-bottom:.1em;
    }

    /* ── End date ──────────────────────────────────────────────── */
    #end-date{
      font-size:clamp(.75rem,1.8vw,1.05rem);
      color:rgba(255,255,255,.4);letter-spacing:.06em;
    }

    /* ── Audio arm button ──────────────────────────────────────── */
    #audio-btn{
      padding:.55rem 1.4rem;border-radius:999px;border:1px solid rgba(99,102,241,.5);
      background:rgba(99,102,241,.12);color:rgba(255,255,255,.7);
      cursor:pointer;font-size:.85rem;letter-spacing:.05em;
      transition:all .2s;
    }
    #audio-btn:hover{background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.9);color:#fff;}
    #audio-btn.armed{border-color:#22c55e;background:rgba(34,197,94,.12);color:#4ade80;}
    #audio-btn:not([data-show]){display:none;}

    /* ── Victory overlay ────────────────────────────────────────── */
    #victory{
      position:fixed;inset:0;z-index:20;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:1.5rem;
      opacity:0;pointer-events:none;
      transition:opacity 1s;
    }
    #victory.show{opacity:1;pointer-events:auto;}
    #victory-title{
      font-size:clamp(3rem,12vw,8rem);font-weight:900;
      letter-spacing:.05em;text-transform:uppercase;
      background:linear-gradient(135deg,#ffd700 0%,#ff6b35 40%,#f72585 70%,#7209b7 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
      filter:drop-shadow(0 0 40px rgba(255,215,0,.5));
      animation:pulse-glow 2s ease-in-out infinite;
    }
    #victory-ally{font-size:clamp(1rem,3vw,2rem);color:#fbbf24;font-weight:700;letter-spacing:.1em;}
    #victory-sub{font-size:clamp(.8rem,2vw,1.2rem);color:rgba(255,255,255,.6);letter-spacing:.1em;}

    @keyframes pulse-glow{
      0%,100%{filter:drop-shadow(0 0 40px rgba(255,215,0,.5));}
      50%{filter:drop-shadow(0 0 80px rgba(255,215,0,.9)) drop-shadow(0 0 120px rgba(247,37,133,.6));}
    }

    /* ── YouTube player (hidden) ────────────────────────────────── */
    #yt-player{position:fixed;bottom:-9999px;right:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;}

    /* ── Progress bar ───────────────────────────────────────────── */
    #progress-wrap{width:min(600px,90vw);height:3px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;}
    #progress-bar{height:100%;width:100%;background:linear-gradient(90deg,#6366f1,#a855f7);border-radius:999px;transform-origin:left;transition:transform 1s linear;}

    /* ── TravOps watermark ─────────────────────────────────────── */
    #watermark{
      position:fixed;bottom:1rem;right:1.2rem;z-index:6;
      font-size:.7rem;color:rgba(255,255,255,.2);letter-spacing:.1em;
    }
    #watermark a{color:inherit;text-decoration:none;}
    #watermark a:hover{color:rgba(255,255,255,.5);}
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<canvas id="fw-canvas"></canvas>

<div id="wrap">
  <div id="ally-name">{{ ally_name }}</div>

  <div id="clock">
    <div class="unit">
      <span class="digits" id="cd-d">00</span>
      <span class="unit-label">Tage</span>
    </div>
    <span class="sep">:</span>
    <div class="unit">
      <span class="digits" id="cd-h">00</span>
      <span class="unit-label">Stunden</span>
    </div>
    <span class="sep">:</span>
    <div class="unit">
      <span class="digits" id="cd-m">00</span>
      <span class="unit-label">Minuten</span>
    </div>
    <span class="sep">:</span>
    <div class="unit">
      <span class="digits" id="cd-s">00</span>
      <span class="unit-label">Sekunden</span>
    </div>
  </div>

  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="end-date">Lädt…</div>
  <button id="audio-btn" onclick="armAudio()">🔇 Musik aktivieren</button>
</div>

<div id="victory">
  <div id="victory-title">🏆 VICTORY!</div>
  <div id="victory-ally">{{ ally_name }}</div>
  <div id="victory-sub">hat den Server gemeistert!</div>
</div>

<!-- YouTube player container (hidden) -->
<div id="yt-player"></div>

<div id="watermark"><a href="https://travops.online" target="_blank">travops.online</a></div>

<script>
// ── Config ─────────────────────────────────────────────────────────────
const GUILD_ID   = {{ guild_id | tojson }};
const MUSIC_URL  = {{ music_url | tojson }};
const END_ISO    = {{ server_end_iso | tojson }};
const TOTAL_SECS = {{ total_secs }};

// ── Stars ───────────────────────────────────────────────────────────────
(function() {
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  let stars = [];

  function resize() {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    stars = Array.from({length: 200}, () => ({
      x: Math.random() * c.width,
      y: Math.random() * c.height,
      r: Math.random() * 1.4,
      a: Math.random(),
      speed: .003 + Math.random() * .008,
      phase: Math.random() * Math.PI * 2,
    }));
  }
  resize();
  window.addEventListener('resize', resize);

  function drawStars(t) {
    ctx.clearRect(0, 0, c.width, c.height);
    for (const s of stars) {
      const alpha = s.a * (.5 + .5 * Math.sin(t * s.speed + s.phase));
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(drawStars);
  }
  requestAnimationFrame(drawStars);
})();

// ── Fireworks ───────────────────────────────────────────────────────────
const fwCanvas = document.getElementById('fw-canvas');
const fwCtx    = fwCanvas.getContext('2d');
let fwRunning  = false;
let fwParticles = [];

function resizeFW() {
  fwCanvas.width  = window.innerWidth;
  fwCanvas.height = window.innerHeight;
}
resizeFW();
window.addEventListener('resize', resizeFW);

function launchFirework() {
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff9f1c','#a855f7','#ec4899','#06b6d4','#f59e0b'];
  const x = 0.15 * fwCanvas.width + Math.random() * 0.7 * fwCanvas.width;
  const y = 0.1  * fwCanvas.height + Math.random() * 0.55 * fwCanvas.height;
  const count = 90 + Math.floor(Math.random() * 40);
  const baseColor = colors[Math.floor(Math.random() * colors.length)];

  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const speed = 2 + Math.random() * 9;
    fwParticles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: .012 + Math.random() * .018,
      color: Math.random() < .7 ? baseColor : colors[Math.floor(Math.random() * colors.length)],
      size: 2.5 + Math.random() * 3.5,
      glow: Math.random() < .3,
    });
  }
}

function animateFireworks() {
  if (!fwRunning) return;
  fwCtx.fillStyle = 'rgba(5,6,15,.18)';
  fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);

  fwParticles = fwParticles.filter(p => p.life > 0.01);
  for (const p of fwParticles) {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += .09;    // gravity
    p.vx *= .98;    // drag
    p.vy *= .98;
    p.life -= p.decay;
    p.size *= .985;

    fwCtx.globalAlpha = Math.max(0, p.life);
    if (p.glow) {
      fwCtx.shadowColor = p.color;
      fwCtx.shadowBlur  = 12;
    }
    fwCtx.fillStyle = p.color;
    fwCtx.beginPath();
    fwCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    fwCtx.fill();
    fwCtx.shadowBlur = 0;
  }
  fwCtx.globalAlpha = 1;
  requestAnimationFrame(animateFireworks);
}

function startFireworks() {
  fwCanvas.classList.add('active');
  fwRunning = true;
  animateFireworks();

  // Rapid initial burst
  for (let i = 0; i < 6; i++) setTimeout(launchFirework, i * 200);

  // Sustained volleys
  let shots = 0;
  const iv = setInterval(() => {
    const burst = Math.floor(Math.random() * 3) + 1;
    for (let i = 0; i < burst; i++) setTimeout(launchFirework, i * 150);
    shots++;
    if (shots > 80) { clearInterval(iv); }
  }, 400);
}

// ── YouTube ─────────────────────────────────────────────────────────────
let ytPlayer = null;
let ytReady  = false;
let audioArmed = false;

function getYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : null;
}

const ytId = getYouTubeId(MUSIC_URL);

if (ytId) {
  document.getElementById('audio-btn').setAttribute('data-show', '1');
  document.getElementById('audio-btn').style.display = '';

  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = function() {
    ytPlayer = new YT.Player('yt-player', {
      videoId: ytId,
      playerVars: { autoplay: 0, controls: 0, playsinline: 1 },
      events: {
        onReady: () => { ytReady = true; }
      }
    });
  };
}

function armAudio() {
  if (!ytPlayer || !ytReady) { return; }
  audioArmed = true;
  ytPlayer.mute();
  ytPlayer.playVideo();
  setTimeout(() => ytPlayer.stopVideo(), 500); // just pre-warm
  const btn = document.getElementById('audio-btn');
  btn.textContent = '🔊 Musik aktiviert';
  btn.classList.add('armed');
}

function playMusic() {
  if (!ytPlayer || !ytReady) return;
  ytPlayer.unMute();
  ytPlayer.setVolume(80);
  ytPlayer.seekTo(0);
  ytPlayer.playVideo();
}

// ── Countdown ───────────────────────────────────────────────────────────
const endTime = new Date(END_ISO + 'Z').getTime();  // UTC ms
let totalOriginal = TOTAL_SECS > 0 ? TOTAL_SECS : 1;
let victoryFired = false;

function pad(n) { return String(Math.max(0,n)).padStart(2,'0'); }

function tick() {
  const now   = Date.now();
  const total = Math.max(0, Math.floor((endTime - now) / 1000));

  document.getElementById('cd-d').textContent = pad(Math.floor(total / 86400));
  document.getElementById('cd-h').textContent = pad(Math.floor((total % 86400) / 3600));
  document.getElementById('cd-m').textContent = pad(Math.floor((total % 3600) / 60));
  document.getElementById('cd-s').textContent = pad(total % 60);

  // Progress bar (shrinks from 100% to 0%)
  const pct = Math.max(0, Math.min(1, total / totalOriginal));
  document.getElementById('progress-bar').style.transform = `scaleX(${pct})`;

  if (total <= 0 && !victoryFired) {
    victoryFired = true;
    fireVictory();
  }
}

function fireVictory() {
  startFireworks();
  document.getElementById('victory').classList.add('show');
  document.getElementById('wrap').style.opacity = '0';
  document.getElementById('wrap').style.transition = 'opacity 1.5s';
  if (audioArmed || !ytId) playMusic();
}

// ── End-date label ──────────────────────────────────────────────────────
(function() {
  try {
    const d = new Date(END_ISO + 'Z');
    const offset = {{ utc_offset }};
    const local = new Date(d.getTime() + offset * 60000);
    const sign  = offset >= 0 ? '+' : '-';
    const tz    = `UTC${sign}${Math.abs(offset)/60|0}`;
    document.getElementById('end-date').textContent =
      local.toLocaleString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric',
        hour:'2-digit',minute:'2-digit'}) + ` ${tz}`;
  } catch(e) {}
})();

// ── Kick off ─────────────────────────────────────────────────────────────
tick();
setInterval(tick, 1000);

// If already ended on load
if (TOTAL_SECS <= 0 && !victoryFired) {
  victoryFired = true;
  setTimeout(fireVictory, 800);
}
</script>
</body>
</html>
