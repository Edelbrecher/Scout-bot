<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{{ ally_name }} · Server Countdown · TravOps</title>
  <meta property="og:title" content="{{ ally_name }} · Server Countdown"/>
  <meta name="theme-color" content="#6366f1"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;overflow:hidden;background:#05060f;font-family:'Segoe UI',system-ui,sans-serif;}

    /* ── Canvas layers ──────────────────────────────────────────── */
    #stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
    #fw-canvas{position:fixed;inset:0;z-index:10;pointer-events:none;opacity:0;transition:opacity .6s;}
    #fw-canvas.active{opacity:1;}

    /* ── Main clock layout ──────────────────────────────────────── */
    #wrap{
      position:relative;z-index:5;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      height:100vh;gap:1.2rem;padding:2rem;text-align:center;
      transition:opacity 1.2s,transform 1.2s;
    }
    #wrap.fade-out{opacity:0;transform:scale(.92);}

    #ally-name{
      font-size:clamp(1rem,2.8vw,1.8rem);font-weight:700;
      letter-spacing:.14em;text-transform:uppercase;
      color:#fbbf24;text-shadow:0 0 30px rgba(251,191,36,.45);
    }

    /* ── Big clock ──────────────────────────────────────────────── */
    #clock{display:flex;align-items:flex-end;gap:clamp(.25rem,1.2vw,1rem);}
    .unit{display:flex;flex-direction:column;align-items:center;gap:.25rem;}
    .digits{
      font-size:clamp(3rem,11vw,8.5rem);font-weight:900;
      font-family:'Courier New',monospace;font-variant-numeric:tabular-nums;
      color:#e8eaf6;line-height:1;
      text-shadow:0 0 35px rgba(99,102,241,.7),0 0 70px rgba(99,102,241,.3);
    }
    .unit-label{font-size:clamp(.5rem,1.2vw,.78rem);letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:600;}
    .sep{font-size:clamp(2rem,8vw,6.5rem);font-weight:900;color:rgba(99,102,241,.5);line-height:1;padding-bottom:.08em;}

    #progress-wrap{width:min(580px,88vw);height:3px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;}
    #progress-bar{height:100%;width:100%;background:linear-gradient(90deg,#6366f1,#a855f7);border-radius:999px;transform-origin:left;transition:transform 1s linear;}

    #end-date{font-size:clamp(.7rem,1.5vw,.95rem);color:rgba(255,255,255,.35);letter-spacing:.06em;}

    /* ── Music button ───────────────────────────────────────────── */
    #music-btn{
      padding:.5rem 1.3rem;border-radius:999px;border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);
      cursor:pointer;font-size:.82rem;letter-spacing:.05em;transition:all .2s;
    }
    #music-btn:hover{background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.7);color:#fff;}
    #music-btn.playing{border-color:#22c55e;background:rgba(34,197,94,.1);color:#4ade80;}
    #music-btn[hidden]{display:none;}

    /* ── Jarves sequence overlay ─────────────────────────────────── */
    #jarves-wrap{
      position:fixed;inset:0;z-index:15;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:clamp(.4rem,2vh,.9rem);pointer-events:none;
      opacity:0;
    }
    #jarves-wrap.visible{opacity:1;}

    .jword{
      font-size:clamp(2.8rem,13vw,10rem);font-weight:900;
      letter-spacing:.06em;text-transform:uppercase;
      opacity:0;transform:translateY(-60px) scale(1.3);
      transition:opacity .25s, transform .35s cubic-bezier(.22,.68,0,1.4);
      line-height:1;will-change:transform,opacity;
    }
    .jword.show{opacity:1;transform:translateY(0) scale(1);}

    #jw-0{ color:#fbbf24; text-shadow:0 0 50px rgba(251,191,36,.7),0 0 100px rgba(251,191,36,.3); }
    #jw-1{ color:#f97316; text-shadow:0 0 50px rgba(249,115,22,.7),0 0 100px rgba(249,115,22,.3); }
    #jw-2{ color:#e2e8f0; text-shadow:0 0 40px rgba(226,232,240,.5); }
    #jw-3{
      color:#f43f5e;
      text-shadow:0 0 50px rgba(244,63,94,.9),0 0 100px rgba(244,63,94,.5),0 0 160px rgba(244,63,94,.3);
      animation:none;
    }
    #jw-3.show{ animation: engine-pulse 1.2s ease-in-out infinite; }

    @keyframes engine-pulse{
      0%,100%{text-shadow:0 0 50px rgba(244,63,94,.9),0 0 100px rgba(244,63,94,.5),0 0 160px rgba(244,63,94,.3);}
      50%{text-shadow:0 0 80px rgba(244,63,94,1),0 0 160px rgba(244,63,94,.8),0 0 240px rgba(244,63,94,.5);}
    }
    @keyframes shake{
      0%,100%{transform:translateX(0);}
      20%{transform:translateX(-8px);}
      40%{transform:translateX(8px);}
      60%{transform:translateX(-5px);}
      80%{transform:translateX(5px);}
    }
    .engine-shake{ animation:engine-pulse 1.2s ease-in-out infinite, shake .4s ease-in-out !important; }

    /* ── Victory overlay ────────────────────────────────────────── */
    #victory{
      position:fixed;inset:0;z-index:20;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:1.2rem;opacity:0;pointer-events:none;transition:opacity 1.2s;
    }
    #victory.show{opacity:1;pointer-events:auto;}
    #victory-title{
      font-size:clamp(3rem,14vw,9rem);font-weight:900;letter-spacing:.05em;
      background:linear-gradient(135deg,#ffd700 0%,#ff6b35 40%,#f72585 70%,#7209b7 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:pulse-glow 2s ease-in-out infinite;
    }
    #victory-ally{font-size:clamp(.9rem,2.5vw,1.8rem);color:#fbbf24;font-weight:700;letter-spacing:.1em;}
    #victory-sub{font-size:clamp(.7rem,1.6vw,1.1rem);color:rgba(255,255,255,.55);letter-spacing:.1em;}
    #victory-music-btn{
      margin-top:.5rem;padding:.6rem 1.6rem;border-radius:999px;
      border:1px solid rgba(34,197,94,.5);background:rgba(34,197,94,.15);
      color:#4ade80;cursor:pointer;font-size:.9rem;letter-spacing:.05em;transition:all .2s;
    }
    #victory-music-btn:hover{background:rgba(34,197,94,.3);}
    #victory-music-btn[hidden]{display:none;}

    @keyframes pulse-glow{
      0%,100%{filter:drop-shadow(0 0 40px rgba(255,215,0,.5));}
      50%{filter:drop-shadow(0 0 90px rgba(255,215,0,.9)) drop-shadow(0 0 140px rgba(247,37,133,.6));}
    }

    /* ── Enemy tags ─────────────────────────────────────────────── */
    #enemy-layer{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden;}
    .etag{
      position:absolute;
      font-size:clamp(.65rem,1.4vw,1rem);font-weight:700;
      letter-spacing:.06em;text-transform:uppercase;
      padding:.25em .6em;border-radius:5px;
      border:1px solid currentColor;
      opacity:0;
      will-change:transform,opacity;
      transition:transform .3s ease,opacity .3s ease;
    }
    .etag.visible{opacity:.28;}
    .etag.pulse{animation:etag-pulse .5s ease-in-out infinite alternate;}
    .etag.burst{
      opacity:0 !important;
      transform:scale(4) !important;
      transition:transform .25s ease-out,opacity .25s ease-out !important;
    }
    @keyframes etag-pulse{
      from{opacity:.28;transform:var(--drift) scale(1);}
      to{opacity:.55;transform:var(--drift) scale(1.15);}
    }
    @keyframes edot-fly{
      0%  {transform:translate(-50%,-50%) scale(1);opacity:1;}
      100%{transform:translate(calc(-50% + var(--ex)),calc(-50% + var(--ey))) scale(0);opacity:0;}
    }
    @keyframes etag-float{
      0%  {transform:translate(0,0) rotate(var(--r0));}
      33% {transform:translate(var(--dx),var(--dy)) rotate(var(--r1));}
      66% {transform:translate(calc(var(--dx)*-.6),calc(var(--dy)*.8)) rotate(var(--r2));}
      100%{transform:translate(0,0) rotate(var(--r0));}
    }

    /* ── YouTube (hidden player) ────────────────────────────────── */
    #yt-wrap{position:fixed;bottom:-9999px;right:-9999px;width:320px;height:180px;opacity:.01;pointer-events:none;}

    /* ── Watermark ──────────────────────────────────────────────── */
    #watermark{position:fixed;bottom:.8rem;right:1rem;z-index:6;font-size:.65rem;color:rgba(255,255,255,.18);}
    #watermark a{color:inherit;text-decoration:none;}
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<canvas id="fw-canvas"></canvas>
<div id="enemy-layer"></div>

<!-- Main countdown -->
<div id="wrap">
  <div id="ally-name">{{ ally_name }}</div>

  <div id="clock">
    <div class="unit"><span class="digits" id="cd-d">00</span><span class="unit-label">Days</span></div>
    <span class="sep">:</span>
    <div class="unit"><span class="digits" id="cd-h">00</span><span class="unit-label">Hours</span></div>
    <span class="sep">:</span>
    <div class="unit"><span class="digits" id="cd-m">00</span><span class="unit-label">Minutes</span></div>
    <span class="sep">:</span>
    <div class="unit"><span class="digits" id="cd-s">00</span><span class="unit-label">Seconds</span></div>
  </div>

  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="end-date">Loading…</div>
  <div id="btn-row" style="display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;">
    <button id="voice-btn" onclick="activateVoice(this)"
      style="padding:.45rem 1.1rem;border-radius:999px;border:1px solid rgba(255,255,255,.18);
             background:rgba(255,255,255,.06);color:rgba(255,255,255,.55);cursor:pointer;
             font-size:.8rem;letter-spacing:.05em;transition:all .2s;">
      🔈 Enable Voice
    </button>
    {% if music_url %}
    <button id="music-btn" onclick="startMusic()"
      style="padding:.45rem 1.1rem;border-radius:999px;border:1px solid rgba(255,255,255,.18);
             background:rgba(255,255,255,.06);color:rgba(255,255,255,.55);cursor:pointer;
             font-size:.8rem;letter-spacing:.05em;transition:all .2s;">
      🔇 Music at Victory
    </button>
    {% endif %}
  </div>
</div>

<!-- Jarves sequence -->
<div id="jarves-wrap">
  <div class="jword" id="jw-0">JARVES</div>
  <div class="jword" id="jw-1">START</div>
  <div class="jword" id="jw-2">THE</div>
  <div class="jword" id="jw-3">ENGINE!</div>
</div>

<!-- Victory -->
<div id="victory">
  <div id="victory-title">🏆 VICTORY!</div>
  <div id="victory-ally">{{ ally_name }}</div>
  <div id="victory-sub">has conquered the server!</div>
  <button id="victory-music-btn" hidden onclick="startMusicNow()">▶ Play Music</button>
</div>

<!-- YouTube hidden player slot -->
<div id="yt-wrap"><div id="yt-player"></div></div>

<div id="watermark"><a href="https://travops.online" target="_blank">travops.online</a></div>

<script>
// ── Config ─────────────────────────────────────────────────────────────
const END_ISO    = "{{ server_end_iso }}";
const MUSIC_URL  = {{ music_url | tojson }};
const TOTAL_ORIG = {{ total_secs }};
const UTC_OFFSET = {{ utc_offset }};

const endTime = new Date(END_ISO.replace(' ','T') + (END_ISO.includes('Z') ? '' : 'Z')).getTime();

// ── Stars ───────────────────────────────────────────────────────────────
(function(){
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){
    c.width = innerWidth; c.height = innerHeight;
    stars = Array.from({length:220},()=>({
      x:Math.random()*c.width, y:Math.random()*c.height,
      r:.3+Math.random()*1.3, a:Math.random(),
      sp:.003+Math.random()*.009, ph:Math.random()*Math.PI*2
    }));
  }
  resize(); addEventListener('resize',resize);
  function draw(t){
    ctx.clearRect(0,0,c.width,c.height);
    for(const s of stars){
      ctx.globalAlpha = s.a*(.45+.55*Math.sin(t*s.sp+s.ph));
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();

// ── Fireworks ───────────────────────────────────────────────────────────
const fwC = document.getElementById('fw-canvas');
const fwX = fwC.getContext('2d');
let fwOn = false, fwPs = [];
function resizeFW(){ fwC.width=innerWidth; fwC.height=innerHeight; }
resizeFW(); addEventListener('resize',resizeFW);

function launchFW(){
  const cols=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff9f1c','#a855f7','#ec4899','#06b6d4','#fbbf24'];
  const x = fwC.width*(.15+Math.random()*.7);
  const y = fwC.height*(.08+Math.random()*.55);
  const base = cols[Math.floor(Math.random()*cols.length)];
  for(let i=0;i<100;i++){
    const a=(i/100)*Math.PI*2, sp=2+Math.random()*10;
    fwPs.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:1,dec:.01+Math.random()*.02,
      col:Math.random()<.7?base:cols[Math.floor(Math.random()*cols.length)],
      sz:2+Math.random()*4});
  }
}
function animFW(){
  if(!fwOn)return;
  fwX.fillStyle='rgba(5,6,15,.17)'; fwX.fillRect(0,0,fwC.width,fwC.height);
  fwPs = fwPs.filter(p=>p.life>.01);
  for(const p of fwPs){
    p.x+=p.vx; p.y+=p.vy; p.vy+=.1; p.vx*=.98; p.vy*=.98;
    p.life-=p.dec; p.sz*=.985;
    fwX.globalAlpha=Math.max(0,p.life);
    fwX.fillStyle=p.col;
    fwX.beginPath(); fwX.arc(p.x,p.y,p.sz,0,Math.PI*2); fwX.fill();
  }
  fwX.globalAlpha=1;
  requestAnimationFrame(animFW);
}
function startFW(){
  fwC.classList.add('active'); fwOn=true; animFW();
  for(let i=0;i<7;i++) setTimeout(launchFW,i*180);
  let shots=0;
  const iv=setInterval(()=>{
    const b=1+Math.floor(Math.random()*3);
    for(let i=0;i<b;i++) setTimeout(launchFW,i*140);
    if(++shots>90){clearInterval(iv);}
  },380);
}

// ── Music ───────────────────────────────────────────────────────────────
let ytPlayer=null, ytReady=false, musicArmed=false, musicPlaying=false;

function getYtId(url){
  if(!url) return null;
  const m=url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  return m?m[1]:null;
}
const ytId = getYtId(MUSIC_URL);

if(ytId){
  // Load YouTube iframe API
  const s=document.createElement('script');
  s.src='https://www.youtube.com/iframe_api';
  document.head.appendChild(s);

  window.onYouTubeIframeAPIReady = function(){
    ytPlayer = new YT.Player('yt-player',{
      width:'320', height:'180',
      videoId: ytId,
      playerVars:{ autoplay:0, controls:0, playsinline:1, rel:0 },
      events:{ onReady(){ ytReady=true; } }
    });
  };
}

function activateVoice(btn){
  // Trigger a silent utterance to unlock speechSynthesis during user gesture
  if(typeof speechSynthesis === 'undefined') return;
  const u = new SpeechSynthesisUtterance('');
  u.volume = 0;
  speechSynthesis.speak(u);
  btn.textContent = '🔊 Voice Ready';
  btn.style.borderColor = 'rgba(34,197,94,.5)';
  btn.style.background  = 'rgba(34,197,94,.1)';
  btn.style.color       = '#4ade80';
  btn.onclick = null;
}

function startMusic(){
  if(!ytId||!ytPlayer||!ytReady) return;
  musicArmed = true;
  const btn = document.getElementById('music-btn');
  if(btn){
    btn.textContent='🎵 Music starts at Victory';
    btn.style.borderColor='rgba(34,197,94,.5)';
    btn.style.background='rgba(34,197,94,.1)';
    btn.style.color='#4ade80';
  }
}

function startMusicNow(){
  if(!ytId||!ytPlayer||!ytReady) return;
  ytPlayer.seekTo(0);
  ytPlayer.setVolume(85);
  ytPlayer.playVideo();
  musicPlaying=true;
  document.getElementById('victory-music-btn').hidden=true;
}

function triggerMusic(){
  if(!ytId||!ytPlayer||!ytReady){ return; }
  if(musicArmed){
    startMusicNow();
  } else {
    // Music wasn't armed — show button on victory screen instead
    document.getElementById('victory-music-btn').hidden=false;
  }
}

// ── Speech synthesis (Jarves voice) ────────────────────────────────────
let speechReady = false;
let preferredVoice = null;

function initVoices(){
  const voices = speechSynthesis.getVoices();
  if(!voices.length) return;
  speechReady = true;
  // Prefer a deep English male voice for the JARVIS effect
  const prio = [
    v => v.lang==='en-GB' && /male|david|george/i.test(v.name),
    v => v.lang.startsWith('en-GB'),
    v => v.lang.startsWith('en') && /male|david|james|mark/i.test(v.name),
    v => v.lang.startsWith('en'),
  ];
  for(const test of prio){
    const found = voices.find(test);
    if(found){ preferredVoice = found; break; }
  }
}
if(typeof speechSynthesis !== 'undefined'){
  speechSynthesis.getVoices(); // trigger load
  speechSynthesis.addEventListener('voiceschanged', initVoices);
  setTimeout(initVoices, 500); // fallback
}

const VOICE_LINES = [
  { text:"Jarves",  pitch:0.55, rate:0.7,  volume:1   },
  { text:"Start",   pitch:0.65, rate:0.78, volume:1   },
  { text:"The",     pitch:0.65, rate:0.85, volume:1   },
  { text:"Engine!", pitch:0.9,  rate:1.15, volume:1   },
];

function speakWord(idx){
  if(typeof speechSynthesis === 'undefined') return;
  speechSynthesis.cancel();
  const cfg = VOICE_LINES[idx];
  const u = new SpeechSynthesisUtterance(cfg.text);
  u.pitch  = cfg.pitch;
  u.rate   = cfg.rate;
  u.volume = cfg.volume;
  if(preferredVoice) u.voice = preferredVoice;
  speechSynthesis.speak(u);
}

// ── Jarves sequence ─────────────────────────────────────────────────────
const JARVES_TIMINGS = [12, 9, 6, 3]; // show each word at N seconds remaining

function showJarvesWord(idx){
  const w = document.getElementById('jw-'+idx);
  if(!w) return;
  document.getElementById('jarves-wrap').classList.add('visible');
  w.classList.add('show');
  speakWord(idx);
  if(idx===3){
    setTimeout(()=>{ w.classList.add('engine-shake'); }, 10);
  }
}

// ── Countdown tick ───────────────────────────────────────────────────────
const totalOrig = TOTAL_ORIG > 0 ? TOTAL_ORIG : 1;
let victoryFired = false;
const jarvisShown = [false,false,false,false];

function pad(n){ return String(Math.max(0,n)).padStart(2,'0'); }

function tick(){
  const now   = Date.now();
  const total = Math.max(0, Math.floor((endTime - now) / 1000));

  document.getElementById('cd-d').textContent = pad(Math.floor(total/86400));
  document.getElementById('cd-h').textContent = pad(Math.floor((total%86400)/3600));
  document.getElementById('cd-m').textContent = pad(Math.floor((total%3600)/60));
  document.getElementById('cd-s').textContent = pad(total%60);

  const pct = Math.max(0,Math.min(1,total/totalOrig));
  document.getElementById('progress-bar').style.transform=`scaleX(${pct})`;

  // Jarves word triggers
  JARVES_TIMINGS.forEach((t,i)=>{
    if(!jarvisShown[i] && total<=t && total>0){
      jarvisShown[i]=true;
      showJarvesWord(i);
    }
  });

  if(total<=0 && !victoryFired){
    victoryFired=true;
    fireVictory();
  }
}

function fireVictory(){
  burstAllEnemyTags();
  setTimeout(startFW, 600);
  // Fade clock out
  document.getElementById('wrap').classList.add('fade-out');
  setTimeout(()=>{
    document.getElementById('jarves-wrap').style.display='none';
    document.getElementById('victory').classList.add('show');
  }, 800);
  triggerMusic();
}

// ── End-date label ──────────────────────────────────────────────────────
(function(){
  try{
    const raw = END_ISO.replace(' ','T') + (END_ISO.includes('Z')?'':'Z');
    const d   = new Date(raw);
    const loc = new Date(d.getTime()+UTC_OFFSET*60000);
    const sign= UTC_OFFSET>=0?'+':'-';
    const tz  = `UTC${sign}${Math.abs(UTC_OFFSET)/60|0}`;
    const fmt = n=>String(n).padStart(2,'0');
    document.getElementById('end-date').textContent =
      `${fmt(loc.getUTCMonth()+1)}/${fmt(loc.getUTCDate())}/${loc.getUTCFullYear()} `+
      `${fmt(loc.getUTCHours())}:${fmt(loc.getUTCMinutes())}:${fmt(loc.getUTCSeconds())} ${tz}`;
  }catch(e){}
})();

// ── Enemy tags (float → burst → respawn loop) ────────────────────────────
const CD_TOKEN = {{ token | tojson }};
let allTokens  = [];   // [{text, color, size, weight}]  — master pool
let activeTags = [];   // [{el, x, y, color, timer}]
let victoryMode = false;

function rnd(min,max){ return min + Math.random()*(max-min); }

// Safe position: avoid centre clock (~35% of screen width/height)
function safePos(){
  let x,y,tries=0;
  do {
    x = rnd(.03,.97); y = rnd(.03,.97);
    tries++;
  } while(
    (x>.3&&x<.7&&y>.22&&y<.78) && tries<40
  );
  return [x,y];
}

function particleBurst(x,y,color,count=28){
  const layer = document.getElementById('enemy-layer');
  for(let i=0;i<count;i++){
    const dot = document.createElement('span');
    dot.style.cssText = `
      position:fixed;pointer-events:none;z-index:3;
      left:${x}px;top:${y}px;
      width:${3+Math.random()*4}px;height:${3+Math.random()*4}px;
      border-radius:50%;background:${color};
      transform:translate(-50%,-50%);
      animation:edot-fly ${.4+Math.random()*.4}s ease-out forwards;
      --ex:${(Math.random()*2-1)*120}px;
      --ey:${(Math.random()*2-1)*120}px;
    `;
    layer.appendChild(dot);
    setTimeout(()=>dot.remove(), 900);
  }
}

function spawnTag(token){
  if(victoryMode) return;
  const layer = document.getElementById('enemy-layer');
  const [px,py] = safePos();
  const W=innerWidth, H=innerHeight;
  const cx=px*W, cy=py*H;

  const el = document.createElement('div');
  el.className = 'etag';
  el.textContent = token.text;
  el.style.color      = token.color;
  el.style.fontSize   = token.size;
  el.style.fontWeight = token.weight;

  const dur = rnd(14,28);
  const dx=rnd(-70,70)+'px', dy=rnd(-50,50)+'px';
  const r0=rnd(-9,9)+'deg', r1=rnd(-14,14)+'deg', r2=rnd(-7,7)+'deg';
  el.style.cssText += `left:${px*100}%;top:${py*100}%;
    --dx:${dx};--dy:${dy};--r0:${r0};--r1:${r1};--r2:${r2};
    animation:etag-float ${dur}s ease-in-out infinite;
    animation-delay:-${rnd(0,dur)}s;`;
  layer.appendChild(el);

  // Fade in
  setTimeout(()=> el.classList.add('visible'), 50);

  // Stay visible for 6–14s, then burst and respawn
  const stayMs = rnd(6000,14000);
  const handle = {el, cx, cy, color:token.color, token};
  activeTags.push(handle);

  handle.burstTimer = setTimeout(()=>{
    if(victoryMode){ el.remove(); return; }
    // Quick pulse
    el.classList.add('pulse');
    setTimeout(()=>{
      el.classList.add('burst');
      // Get current rendered position for accurate particle origin
      const rect = el.getBoundingClientRect();
      const pcx  = rect.left + rect.width/2;
      const pcy  = rect.top  + rect.height/2;
      particleBurst(pcx, pcy, token.color, 35);
      setTimeout(()=>{
        el.remove();
        activeTags = activeTags.filter(t=>t!==handle);
        // Respawn this token after a short pause
        setTimeout(()=> spawnTag(token), rnd(1500,4000));
      }, 400);
    }, 250);
  }, stayMs);
}

function buildTokenPool(groups){
  groups.forEach(g=>{
    allTokens.push({text:g.name, color:g.color, size:'1.1em', weight:'900'});
  });
}

function startEnemyLoop(groups){
  buildTokenPool(groups);
  if(!allTokens.length) return;

  // Stagger initial spawns — show up to 20 tags simultaneously
  const initial = Math.min(allTokens.length, 20);
  // Shuffle
  const shuffled = [...allTokens].sort(()=>Math.random()-.5);
  shuffled.slice(0,initial).forEach((t,i)=>{
    setTimeout(()=>spawnTag(t), i*300);
  });
}

function burstAllEnemyTags(){
  victoryMode = true;
  activeTags.forEach(({el,cx,cy,color,burstTimer},i)=>{
    clearTimeout(burstTimer);
    setTimeout(()=>{
      el.classList.add('pulse');
      setTimeout(()=>{
        const rect=el.getBoundingClientRect();
        el.classList.add('burst');
        particleBurst(rect.left+rect.width/2, rect.top+rect.height/2, color, 55);
        setTimeout(()=>el.remove(), 400);
      }, 200);
    }, i*60);
  });
  activeTags=[];
}

fetch(`/api/countdown/${CD_TOKEN}/enemies`)
  .then(r=>r.json())
  .then(groups=>{ if(groups&&groups.length) startEnemyLoop(groups); })
  .catch(()=>{});

// ── Boot ─────────────────────────────────────────────────────────────────
tick();
setInterval(tick, 1000);

if(TOTAL_ORIG<=0 && !victoryFired){
  victoryFired=true;
  setTimeout(fireVictory,600);
}
</script>
