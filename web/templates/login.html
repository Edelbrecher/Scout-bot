{% extends "base.html" %}
{% block title %}Login · BIG-EYE-BOT{% endblock %}

{% block content %}
<div class="login-wrapper">
  <div class="card login-card">
    <img src="/static/logo.png" alt="BIG-EYE-BOT" style="width:120px; height:120px; object-fit:cover; border-radius:50%; margin: 0 auto 1rem; display:block;" />
    <h1 style="margin-top:0; text-align:center;">BIG-EYE-BOT</h1>
    <p class="subtitle" style="text-align:center;">BIG-EYE is helping to handle hundreds of scouts and res-pushes</p>
    <p class="subtitle" style="text-align:center; margin-top:0.2rem; font-size:0.8rem;">Created by Currax</p>

    {% if error %}
    <div class="alert alert-error" style="margin-top:1rem;">{{ error }}</div>
    {% endif %}

    <a href="/auth/discord" class="btn-discord">
      <svg width="20" height="20" viewBox="0 0 71 55" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle; margin-right:8px;">
        <path d="M60.1 4.9A58.6 58.6 0 0 0 45.7.9a.2.2 0 0 0-.2.1 40.8 40.8 0 0 0-1.8 3.7 54 54 0 0 0-16.2 0A37.5 37.5 0 0 0 25.6 1a.2.2 0 0 0-.2-.1A58.4 58.4 0 0 0 11 4.9a.2.2 0 0 0-.1.1C1.6 18.6-1 31.9.3 45.1a.2.2 0 0 0 .1.2 58.8 58.8 0 0 0 17.7 9 .2.2 0 0 0 .3-.1 42 42 0 0 0 3.6-5.9.2.2 0 0 0-.1-.3 38.7 38.7 0 0 1-5.5-2.6.2.2 0 0 1 0-.4c.4-.3.7-.6 1.1-.9a.2.2 0 0 1 .2 0c11.5 5.3 24 5.3 35.4 0a.2.2 0 0 1 .2 0c.4.3.7.6 1.1.9a.2.2 0 0 1 0 .4 36.2 36.2 0 0 1-5.5 2.6.2.2 0 0 0-.1.3 47.1 47.1 0 0 0 3.6 5.9.2.2 0 0 0 .3.1 58.6 58.6 0 0 0 17.8-9 .2.2 0 0 0 .1-.2C73 29.7 69.4 16.5 60.2 5a.2.2 0 0 0-.1-.1ZM23.7 37c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.6 0 6.5 3.3 6.4 7.2 0 4-2.8 7.2-6.4 7.2Zm23.7 0c-3.5 0-6.4-3.2-6.4-7.2s2.8-7.2 6.4-7.2c3.6 0 6.5 3.3 6.4 7.2 0 4-2.8 7.2-6.4 7.2Z" fill="currentColor"/>
      </svg>
      Login with Discord
    </a>

    <details style="margin-top:2rem;">
      <summary style="cursor:pointer; font-size:0.8rem; color:var(--text-muted);">Admin login</summary>
      <form method="post" action="/login" style="margin-top:1rem;">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required autofocus />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Login</button>
      </form>
    </details>
  </div>
</div>
{% endblock %}
