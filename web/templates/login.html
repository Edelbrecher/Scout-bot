{% extends "base.html" %}
{% block title %}Login · BIG-EYE-BOT{% endblock %}

{% block content %}
<div class="login-wrapper">
  <div class="card login-card">
    <img src="/static/logo.png" alt="BIG-EYE-BOT" style="width:160px; height:160px; object-fit:cover; border-radius:50%; margin-bottom:1rem; display:block; margin-left:auto; margin-right:auto;" />
    <h1 style="margin-top:0;">BIG-EYE-BOT</h1>
    <p class="subtitle">BIG-EYE is helping to handle hundreds of scouts and res-pushes</p>
    <p class="subtitle" style="margin-top:0.25rem; font-size:0.8rem;">Created by Currax</p>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Login</button>
    </form>
  </div>
</div>
{% endblock %}
