<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🗺️ {{ plan.name }} · TravOps Map</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1a0d;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
  #topbar{display:flex;align-items:center;justify-content:space-between;padding:.45rem .9rem;background:#111c11;border-bottom:1px solid #2a3e2a;flex-shrink:0;gap:.75rem;}
  #topbar h1{font-size:.92rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tb-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#ccc;border-radius:5px;padding:3px 10px;font-size:.78rem;cursor:pointer;white-space:nowrap;}
  .tb-btn:hover{background:rgba(255,255,255,.14);}
  #canvas-wrap{flex:1;position:relative;overflow:hidden;}
  #mapCanvas{display:block;width:100%;height:100%;cursor:crosshair;}
  #timeline{flex-shrink:0;height:52px;background:#111c11;border-top:1px solid #2a3e2a;overflow-x:auto;overflow-y:hidden;padding:0 .75rem;display:flex;align-items:center;gap:.35rem;}
  .tl-chip{display:inline-flex;align-items:center;gap:.3rem;font-size:.68rem;padding:2px 7px;border-radius:10px;white-space:nowrap;cursor:default;flex-shrink:0;}
  #status{font-size:.72rem;color:#4ade80;white-space:nowrap;}
  #tooltip{position:absolute;display:none;background:rgba(10,20,10,.94);border:1px solid rgba(255,255,255,.18);padding:.3rem .65rem;border-radius:6px;font-size:.75rem;pointer-events:none;white-space:nowrap;z-index:10;}
</style>
</head>
<body>
<div id="topbar">
  <h1>🗺️ {{ plan.name }}</h1>
  <div style="display:flex;gap:.5rem;align-items:center;flex-shrink:0;">
    <span id="status">Loading…</span>
    <button class="tb-btn" onclick="fitMap()">⊞ Fit</button>
    <button class="tb-btn" onclick="exportPng()">💾 PNG</button>
    <button class="tb-btn" onclick="toggleTimeline()">📅 Timeline</button>
  </div>
</div>
<div id="canvas-wrap">
  <canvas id="mapCanvas"></canvas>
  <div id="tooltip"></div>
</div>
<div id="timeline"></div>

<script>
const GUILD_ID = {{ guild_id | tojson }};
const PLAN_ID  = {{ plan_id }};
let plan = null;
let omState = null; // {minX,maxX,minY,maxY,camOX,camOY,scale,bgVillages}

// ── Tribe colours ─────────────────────────────────────────────────────────
const TRIBE_COL={1:'#f97316',2:'#64748b',3:'#22c55e',4:'#eab308',5:'#f59e0b',6:'#a78bfa',7:'#e879f9'};
function tribeCol(t){return TRIBE_COL[t]||'#888';}

const waveColors={real:'#ef4444',fake:'#f97316',chief:'#3b82f6',def:'#a78bfa',scout:'#22c55e'};

function fmtDur(sec){
  if(!sec)return'';
  sec=Math.round(sec);
  const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;
  return h>0?`${h}h ${String(m).padStart(2,'0')}m`:`${m}m ${String(s).padStart(2,'0')}s`;
}

// ── World ↔ Canvas ────────────────────────────────────────────────────────
function w2c(wx,wy){
  const s=omState,c=document.getElementById('mapCanvas');
  const rx=(s.maxX-s.minX)||1,ry=(s.maxY-s.minY)||1;
  const bs=Math.min(c.width/rx,c.height/ry),sc=bs*s.scale;
  return[(c.width/2)+((wx-(s.minX+s.maxX)/2)*sc)+s.camOX,
         (c.height/2)-((wy-(s.minY+s.maxY)/2)*sc)+s.camOY];
}
function c2w(cx,cy){
  const s=omState,c=document.getElementById('mapCanvas');
  const rx=(s.maxX-s.minX)||1,ry=(s.maxY-s.minY)||1;
  const bs=Math.min(c.width/rx,c.height/ry),sc=bs*s.scale;
  return[(s.minX+s.maxX)/2+(cx-c.width/2-s.camOX)/sc,
         (s.minY+s.maxY)/2-(cy-c.height/2-s.camOY)/sc];
}

// ── Arrow (comet) ─────────────────────────────────────────────────────────
function drawArrow(ctx,x1,y1,x2,y2,color,alpha,lw,label){
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<4)return;
  const ux=dx/len,uy=dy/len,angle=Math.atan2(dy,dx);
  const sx=x1+ux*9,sy=y1+uy*9,ex=x2-ux*10,ey=y2-uy*10;
  const px2=-uy,py2=ux,w0=Math.max(0.5,lw*0.3),w1=Math.max(2,lw*1.6);
  ctx.save();ctx.globalAlpha=alpha;
  ctx.beginPath();
  ctx.moveTo(sx+px2*w0,sy+py2*w0);ctx.lineTo(ex+px2*w1,ey+py2*w1);
  ctx.lineTo(ex-px2*w1,ey-py2*w1);ctx.lineTo(sx-px2*w0,sy-py2*w0);
  ctx.closePath();
  const g=ctx.createLinearGradient(sx,sy,ex,ey);
  g.addColorStop(0,color+'44');g.addColorStop(1,color+'ee');
  ctx.fillStyle=g;ctx.fill();
  const hl=Math.max(10,w1*2.5);
  ctx.globalAlpha=alpha;ctx.fillStyle=color;
  ctx.beginPath();ctx.moveTo(ex+ux*hl,ey+uy*hl);
  ctx.lineTo(ex+px2*w1*1.8,ey+py2*w1*1.8);ctx.lineTo(ex-px2*w1*1.8,ey-py2*w1*1.8);
  ctx.closePath();ctx.fill();
  if(label&&len>50){
    const mx=(sx+ex)/2,my=(sy+ey)/2;
    ctx.globalAlpha=1;ctx.font='bold 10px sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    let rot=angle;if(rot>Math.PI/2||rot<-Math.PI/2)rot+=Math.PI;
    ctx.translate(mx,my);ctx.rotate(rot);
    const tw=ctx.measureText(label).width+8;
    ctx.fillStyle='rgba(0,0,0,0.75)';
    ctx.roundRect?ctx.roundRect(-tw/2,-7,tw,14,3):ctx.rect(-tw/2,-7,tw,14);
    ctx.fill();ctx.fillStyle=color;ctx.fillText(label,0,0);
  }
  ctx.restore();
}

// ── Main draw ─────────────────────────────────────────────────────────────
function draw(){
  const canvas=document.getElementById('mapCanvas');
  const ctx=canvas.getContext('2d');
  const s=omState;
  ctx.fillStyle='#1a2e12';ctx.fillRect(0,0,canvas.width,canvas.height);
  if(!s||!plan)return;
  const rx=(s.maxX-s.minX)||1,ry=(s.maxY-s.minY)||1;
  const bs=Math.min(canvas.width/rx,canvas.height/ry),sc=bs*s.scale;

  // background villages
  const vs=Math.max(2,Math.min(6,sc*0.35));
  for(const v of (s.bgVillages||[])){
    const[px,py]=w2c(v.x,v.y);
    if(px<-vs||px>canvas.width+vs||py<-vs||py>canvas.height+vs)continue;
    ctx.fillStyle=v.is_capital?'#ffe066':tribeCol(v.tribe);
    ctx.globalAlpha=0.45;ctx.fillRect(px-vs/2,py-vs/2,vs,vs);
  }
  ctx.globalAlpha=1;

  // grid
  const gs=Math.max(1,Math.round(20/sc));
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  for(let gx=Math.floor(s.minX/gs)*gs;gx<=s.maxX;gx+=gs){const[px]=w2c(gx,0);ctx.beginPath();ctx.moveTo(px,0);ctx.lineTo(px,canvas.height);ctx.stroke();}
  for(let gy=Math.floor(s.minY/gs)*gs;gy<=s.maxY;gy+=gs){const[,py]=w2c(0,gy);ctx.beginPath();ctx.moveTo(0,py);ctx.lineTo(canvas.width,py);ctx.stroke();}

  // attacker map
  const amap=new Map();
  for(const t of(plan.targets||[]))for(const w of(t.waves||[])){
    if(w.origin_x!=null&&w.origin_y!=null){
      const k=`${w.origin_x}|${w.origin_y}`;
      if(!amap.has(k))amap.set(k,{name:w.attacker_name||'?',x:w.origin_x,y:w.origin_y});
    }
  }

  // attack lines
  for(const t of(plan.targets||[])){
    if(t.x==null)continue;
    const[tx,ty]=w2c(t.x,t.y);
    for(const w of(t.waves||[])){
      if(w.origin_x==null)continue;
      const[ax,ay]=w2c(w.origin_x,w.origin_y);
      let wt=(w.wave_type||'real').toLowerCase();
      drawArrow(ctx,ax,ay,tx,ty,waveColors[wt]||'#ef4444',0.75,Math.max(1.5,sc*0.08),fmtDur(w.travel_seconds));
    }
  }

  // attacker dots
  const dr=Math.max(4,sc*0.4);
  ctx.font=`bold ${Math.max(9,Math.min(12,sc))}px sans-serif`;
  for(const[,av]of amap){
    const[px,py]=w2c(av.x,av.y);
    ctx.beginPath();ctx.arc(px,py,dr,0,Math.PI*2);
    ctx.fillStyle='#3b82f6';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#93c5fd';ctx.textAlign='center';ctx.fillText(av.name,px,py-dr-3);
  }

  // target dots
  const tr2=Math.max(5,sc*0.5);
  for(const t of(plan.targets||[])){
    if(t.x==null)continue;
    const[px,py]=w2c(t.x,t.y);
    ctx.beginPath();ctx.arc(px,py,tr2,0,Math.PI*2);
    ctx.fillStyle='#ef4444';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#fca5a5';ctx.textAlign='center';ctx.fillText(t.player_name||t.village_name||'?',px,py-tr2-3);
  }

  // legend
  drawLegend(ctx,canvas,sc);
}

function drawLegend(ctx,canvas,sc){
  const atk=[['Real','#ef4444'],['Fake','#f97316'],['Chief','#3b82f6'],['Def','#a78bfa'],['Scout','#22c55e']];
  const vil=[['Attacker','#3b82f6','dot'],['Target','#ef4444','dot'],['Capital','#ffe066','sq'],
             ['Romans',tribeCol(1),'sq'],['Teutons',tribeCol(2),'sq'],['Gauls',tribeCol(3),'sq'],
             ['Egyptians',tribeCol(5),'sq'],['Huns',tribeCol(6),'sq'],['Spartans',tribeCol(7),'sq']];
  const PAD=8,ROW=17,CW=110,TL=26,rows=Math.max(atk.length,vil.length);
  const pw=CW*2+PAD*3,ph=rows*ROW+PAD*2+14;
  const px0=PAD,py0=canvas.height-ph-PAD;
  ctx.save();ctx.globalAlpha=0.85;ctx.fillStyle='#0d1a0d';
  ctx.roundRect?ctx.roundRect(px0,py0,pw,ph,5):ctx.rect(px0,py0,pw,ph);ctx.fill();ctx.globalAlpha=1;
  ctx.font='bold 8px sans-serif';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.textAlign='left';
  ctx.fillText('ATTACK TYPE',px0+PAD,py0+PAD+4);
  atk.forEach(([l,c],i)=>{
    const tx=px0+PAD,ty=py0+PAD+14+i*ROW+ROW/2;
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx+TL+px2_stub(0.5),ty+py2_stub(0.5));// simplified mini tail
    const g=ctx.createLinearGradient(tx,ty,tx+TL,ty);g.addColorStop(0,c+'44');g.addColorStop(1,c+'ee');
    ctx.fillStyle=g;
    // draw mini comet shape
    ctx.beginPath();
    ctx.moveTo(tx,ty-0.5);ctx.lineTo(tx+TL,ty-3);ctx.lineTo(tx+TL,ty+3);ctx.lineTo(tx,ty+0.5);
    ctx.closePath();ctx.fill();
    ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(tx+TL+7,ty);ctx.lineTo(tx+TL-1,ty-3);ctx.lineTo(tx+TL-1,ty+3);ctx.closePath();ctx.fill();
    ctx.fillStyle='#ddd';ctx.font='9px sans-serif';ctx.fillText(l,tx+TL+10,ty);
  });
  const vx=px0+PAD+CW;
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='bold 8px sans-serif';ctx.fillText('VILLAGES',vx,py0+PAD+4);
  vil.forEach(([l,c,tp],i)=>{
    const tx=vx,ty=py0+PAD+14+i*ROW+ROW/2;
    if(tp==='dot'){ctx.beginPath();ctx.arc(tx+5,ty,4,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.stroke();}
    else{ctx.fillStyle=c;ctx.globalAlpha=0.75;ctx.fillRect(tx+1,ty-4,9,8);ctx.globalAlpha=1;}
    ctx.fillStyle='#ddd';ctx.font='9px sans-serif';ctx.fillText(l,tx+14,ty);
  });
  ctx.restore();
}
function px2_stub(){return 0;}function py2_stub(){return 1;}

// ── Timeline ──────────────────────────────────────────────────────────────
function buildTimeline(){
  const tl=document.getElementById('timeline');
  tl.innerHTML='';
  if(!plan)return;
  const waves=[];
  for(const t of(plan.targets||[]))for(const w of(t.waves||[])){
    if(w.send_time)waves.push({...w,target_name:t.player_name||t.village_name||'?'});
  }
  waves.sort((a,b)=>(a.send_time||'').localeCompare(b.send_time||''));
  if(!waves.length){tl.innerHTML='<span style="color:#555;font-size:.75rem;padding:.5rem;">No waves with send times</span>';return;}
  const span=document.createElement('span');span.style.cssText='color:#555;font-size:.68rem;white-space:nowrap;margin-right:.5rem;';span.textContent='Send order:';tl.appendChild(span);
  for(const w of waves){
    const wt=(w.wave_type||'real').toLowerCase();
    const col=waveColors[wt]||'#ef4444';
    const chip=document.createElement('div');chip.className='tl-chip';
    chip.style.cssText=`border:1px solid ${col}55;background:${col}18;color:${col};`;
    const time=w.send_time?w.send_time.slice(11,16):'—';
    chip.innerHTML=`<span>${time}</span><span style="color:#aaa;">${w.attacker_name||'?'} → ${w.target_name}</span>`;
    chip.title=`${w.attacker_name} → ${w.target_name} | Send: ${w.send_time||'?'} | ${fmtDur(w.travel_seconds)}`;
    tl.appendChild(chip);
  }
}

let timelineVisible=true;
function toggleTimeline(){
  const tl=document.getElementById('timeline');
  timelineVisible=!timelineVisible;
  tl.style.display=timelineVisible?'flex':'none';
  resizeCanvas();
}

// ── Fit / export ──────────────────────────────────────────────────────────
function fitMap(){
  if(!omState)return;
  resizeCanvas(); // ensure canvas dimensions are correct
  omState.camOX=0;omState.camOY=0;omState.scale=1;
  draw();
}
function exportPng(){
  const c=document.getElementById('mapCanvas');
  const a=document.createElement('a');a.download=`op-map-${PLAN_ID}.png`;a.href=c.toDataURL();a.click();
}

// ── Fetch plan + bg villages ──────────────────────────────────────────────
async function loadPlan(){
  try{
    const r=await fetch(`/guild/${GUILD_ID}/operations/api/plans/${PLAN_ID}`,{headers:{Accept:'application/json'}});
    if(!r.ok)return;
    plan=await r.json();
    buildBounds();
    buildTimeline();
    draw();
    // load bg villages
    const s=omState;
    const res=await fetch(`/guild/${GUILD_ID}/operations/api/map-villages?x1=${Math.floor(s.minX)}&y1=${Math.floor(s.minY)}&x2=${Math.ceil(s.maxX)}&y2=${Math.ceil(s.maxY)}`);
    if(res.ok){const d=await res.json();s.bgVillages=d.villages||[];}
    draw();
    document.getElementById('status').textContent='Updated '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }catch(e){document.getElementById('status').textContent='Error loading';}
}

function buildBounds(){
  const pts=[];
  for(const t of(plan.targets||[])){
    if(t.x!=null)pts.push({x:t.x,y:t.y});
    for(const w of(t.waves||[]))if(w.origin_x!=null)pts.push({x:w.origin_x,y:w.origin_y});
  }
  if(!pts.length){omState=omState||{minX:-100,maxX:100,minY:-100,maxY:100,camOX:0,camOY:0,scale:1,bgVillages:[]};return;}
  let x0=pts[0].x,x1=pts[0].x,y0=pts[0].y,y1=pts[0].y;
  for(const p of pts){if(p.x<x0)x0=p.x;if(p.x>x1)x1=p.x;if(p.y<y0)y0=p.y;if(p.y>y1)y1=p.y;}
  const px=Math.max((x1-x0)*0.25,15),py=Math.max((y1-y0)*0.25,15);
  const prev=omState||{};
  omState={minX:x0-px,maxX:x1+px,minY:y0-py,maxY:y1+py,camOX:prev.camOX||0,camOY:prev.camOY||0,scale:prev.scale||1,bgVillages:prev.bgVillages||[]};
}

// ── Canvas resize ─────────────────────────────────────────────────────────
function resizeCanvas(){
  const c=document.getElementById('mapCanvas'),w=c.parentElement;
  c.width=w.offsetWidth;c.height=w.offsetHeight;
  draw();
}

// ── Pan + zoom ────────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('mapCanvas');
  let drag=false,dx0,dy0,cx0,cy0;
  c.addEventListener('mousedown',e=>{drag=true;dx0=e.clientX;dy0=e.clientY;const s=omState||{};cx0=s.camOX||0;cy0=s.camOY||0;});
  document.addEventListener('mousemove',e=>{
    if(!drag||!omState)return;
    omState.camOX=cx0+(e.clientX-dx0);omState.camOY=cy0+(e.clientY-dy0);draw();
    // tooltip
    const r=c.getBoundingClientRect();
    const[wx,wy]=c2w(e.clientX-r.left,e.clientY-r.top);
    const tip=document.getElementById('tooltip');
    let best=null,bestD=999;
    for(const t of(plan&&plan.targets||[])){
      if(t.x==null)continue;
      const d=Math.hypot(wx-t.x,wy-t.y);
      if(d<3&&d<bestD){bestD=d;best=`🎯 ${t.player_name||t.village_name} (${t.x}|${t.y})`;}
    }
    if(best){tip.style.display='block';tip.style.left=(e.clientX-r.left+10)+'px';tip.style.top=(e.clientY-r.top-30)+'px';tip.textContent=best;}
    else tip.style.display='none';
  });
  document.addEventListener('mouseup',()=>drag=false);
  c.addEventListener('wheel',e=>{
    if(!omState)return;e.preventDefault();
    const factor=e.deltaY<0?1.15:1/1.15;
    omState.scale=Math.max(0.1,Math.min(50,omState.scale*factor));draw();
  },{passive:false});
})();

// ── Init ──────────────────────────────────────────────────────────────────
window.addEventListener('resize',resizeCanvas);
document.addEventListener('DOMContentLoaded',()=>{
  resizeCanvas();
  loadPlan();
  setInterval(loadPlan,15000); // auto-refresh every 15s
});
</script>
</body>
</html>
